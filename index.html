<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartAssess – Login / Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Use the same CSS file you already have for the grader/analyzer -->
  <link rel="stylesheet" href="Auth.css" />
  <link rel="icon" href="logo.svg" type="image/svg+xml" />

</head>
<body>

  <!-- ============== NAVBAR ============== -->
 

  <!-- ============== HERO ============== -->
  <section class="hero-container">
    <div class="hero-bg"></div>

    <div class="hero-content">
      <h1 class="hero-title">Welcome to SmartAssess</h1>
      <p class="hero-subtitle">
        Sign in or create an account to generate AI-powered assignments, analyze
        student progress, and align with Washington State standards.
      </p>
    </div>
  </section>

  <!-- ============== AUTH CARD ============== -->
  <section class="grading-form">
    <div class="form-container" style="max-width: 640px; margin: 0 auto; flex-direction: column;">

      <!-- Auth Switch Tabs -->
      <div class="switch-links" style="justify-content: center; margin-bottom: 10px;">
        <button class="switch-link auth-tab active" data-target="login-form">
          Login
        </button>
        <button class="switch-link auth-tab" data-target="signup-form">
          Sign Up
        </button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="auth-form active-auth">
        <h2 class="form-label" style="margin-bottom: 16px;">Log in to your account</h2>
      
        <div class="submission">
          <label class="form-label" for="login-email">Email</label>
          <input id="login-email" type="email" class="modal-input" placeholder="your@email.com" required />
      
          <label class="form-label" for="login-password" style="margin-top: 14px;">Password</label>
          <input id="login-password" type="password" class="modal-input" placeholder="Enter your password" required />
      
          <p id="login-message" class="info-text" style="margin-top: 10px;"></p>
      
          <div style="display:flex; justify-content:flex-end; margin-top: 16px;">
            <button id="login-btn" class="btn-purple">Log In</button>
          </div>
        </div>
      </div>
      
      <!-- SIGNUP FORM -->
      <div id="signup-form" class="auth-form" style="display:none;">
        <h2 class="form-label" style="margin-bottom: 16px;">Create a new account</h2>
      
        <div class="submission">
          <label class="form-label">Full Name</label>
          <input id="signup-name" class="modal-input" placeholder="Your name" required />
      

          <label class="form-label" style="margin-top:14px;">Email</label>
          <input id="signup-email" type="email" class="modal-input" placeholder="your@email.com" required />
      
          <label class="form-label" style="margin-top:14px;">Password</label>
          <input id="signup-password" type="password" class="modal-input" placeholder="Enter password" required />
      
          <p id="signup-message" class="info-text" style="margin-top: 10px;"></p>
      
          <div style="display:flex; justify-content:flex-end; margin-top: 16px;">
            <button id="signup-btn" class="btn-purple">Sign Up</button>
          </div>
        </div>
      </div>
      
    </div>
  </section>

  <!-- ============== SIMPLE TOGGLE SCRIPT ============== -->
  <script>
    const tabs = document.querySelectorAll(".auth-tab");
    const forms = {
      "login-form": document.getElementById("login-form"),
      "signup-form": document.getElementById("signup-form"),
    };

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        // switch tab visual
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        // switch forms
        Object.values(forms).forEach(f => (f.style.display = "none"));
        const targetId = tab.getAttribute("data-target");
        forms[targetId].style.display = "block";
      });
    });
  </script>
<script>
  // ----------------------
  // SWITCH LOGIN <-> SIGNUP
  // ----------------------
  document.querySelectorAll(".auth-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".auth-form").forEach(f => f.style.display = "none");
  
      tab.classList.add("active");
      document.getElementById(tab.dataset.target).style.display = "block";
    });
  });
  
  // ----------------------
  // LOGIN FUNCTIONALITY
  // ----------------------
  document.getElementById("login-btn").addEventListener("click", async () => {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value.trim();
    const msg = document.getElementById("login-message");
  
    msg.textContent = "";
    msg.style.color = "#64748b";
  
    try {
      msg.textContent = "Processing login...";
  
      const res = await fetch("https://backendregister-dem3.onrender.com/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
  
      const data = await res.json();
      console.log("🔐 Login:", data);
  
      if (!res.ok) throw new Error(data.message || "Login failed");
  
      // Save user + token locally
      localStorage.setItem("smartassessUser", JSON.stringify(data.user));
      localStorage.setItem("jwt", data.token);
      localStorage.setItem("teacherName", data.user.name);

  
      msg.textContent = "✅ Login successful!";
      msg.style.color = "green";
  
      const nameEnc = encodeURIComponent(data.user.name);
      const emailEnc = encodeURIComponent(data.user.email);
  
      // IMPORTANT: home page requires hash params
      setTimeout(() => {
        window.location.href = `home.html#name=${nameEnc}&email=${emailEnc}`;
      }, 1000);
  
    } catch (err) {
      msg.textContent = "❌ " + err.message;
      msg.style.color = "red";
    }
  });
  
  // ----------------------
  // SIGNUP FUNCTIONALITY
  // ----------------------
  document.getElementById("signup-btn").addEventListener("click", async () => {
    const name = document.getElementById("signup-name").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const password = document.getElementById("signup-password").value.trim();
    const msg = document.getElementById("signup-message");
  
    msg.textContent = "";
    msg.style.color = "#64748b";
  
    try {
      msg.textContent = "Creating account...";
  
      const res = await fetch("https://backendregister-dem3.onrender.com/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password }),
      });
  
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Registration failed");
  
      msg.textContent = "✅ Account created! Redirecting...";
      msg.style.color = "green";
  
      // Return to login tab
      setTimeout(() => {
        window.location.href = "index.html#login";
      }, 1200);
  
    } catch (err) {
      msg.textContent = "❌ " + err.message;
      msg.style.color = "red";
    }
  });
  </script>
  
</body>
</html>
