<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartAssess – Teacher Login</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <script src="config.js"></script>

  <style>
    /* Specific overrides for the Auth Page to match "Onboarding" screenshot */
    body {
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .auth-card {
      background: white;
      width: 100%;
      max-width: 440px;
      padding: 48px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 20px 40px -10px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.05);
      text-align: left;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .tab-switcher {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }

    .tab-item {
      padding-bottom: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-item.active {
      color: var(--brand-primary);
      border-bottom-color: var(--brand-primary);
    }

    .auth-card .input {
      padding: 12px 16px;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid var(--surface-200);
      background: #FFFFFF;
      transition: all 0.2s;
    }

    .auth-card .input:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      outline: none;
    }

    .auth-card .btn-primary {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <!-- Header -->
    <div style="text-align: center; margin-bottom: 32px;">
      <img src="logo.svg" alt="SmartAssess Logo"
        style="width: 100%; max-width: 200px; height: auto; margin-bottom: 32px; display: inline-block;" />
      <h1 class="auth-title">Welcome to SmartAssess</h1>
      <p class="auth-subtitle">Sign in to access your dashboard.</p>
    </div>

    <div class="tab-switcher hidden"> <!-- Hidden logically, toggled via links -->
      <div class="tab-item active" id="tab-login">Login</div>
      <div class="tab-item" id="tab-signup">Sign Up</div>
    </div>

    <!-- Message Area -->
    <div id="auth-message" class="mb-4"
      style="color: var(--accent-error); font-weight: 500; min-height: 20px; text-align: center;"></div>

    <!-- FORMS -->
    <!-- LOGIN -->
    <form id="login-form">
      <div class="form-group">
        <label class="label">Email address</label>
        <input type="email" id="login-email" class="input" placeholder="teacher@school.edu" required>
      </div>

      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" id="login-password" class="input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Sign In
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>

      <div class="mt-4 text-center">
        <span style="color: var(--text-muted); font-size: 0.9rem;">New here? </span>
        <a href="#" onclick="switchTab('signup')"
          style="color:var(--brand-primary); text-decoration:none; font-weight:600;">Create an account</a>
      </div>
    </form>

    <!-- SIGNUP -->
    <form id="signup-form" class="hidden">
      <div class="form-group">
        <label class="label">Full Name</label>
        <input type="text" id="signup-name" class="input" placeholder="Sarah Jenkins" required>
      </div>

      <div class="form-group">
        <label class="label">Email address</label>
        <input type="email" id="signup-email" class="input" placeholder="sarah@school.edu" required>
      </div>

      <div class="form-group">
        <label class="label">Create Password</label>
        <input type="password" id="signup-password" class="input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Create Account
      </button>

      <div class="mt-4 text-center">
        <span style="color: var(--text-muted); font-size: 0.9rem;">Already have an account? </span>
        <a href="#" onclick="switchTab('login')"
          style="color:var(--brand-primary); text-decoration:none; font-weight:600;">Log in</a>
      </div>
    </form>

  </div>

  <script>
    function showMessage(text, type = 'error') {
      const msg = document.getElementById('auth-message');
      msg.textContent = text;
      msg.style.color = type === 'success' ? 'var(--accent-success)' : 'var(--accent-error)';
    }

    function switchTab(mode) {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const title = document.querySelector('.auth-title');
      const subtitle = document.querySelector('.auth-subtitle');

      showMessage(''); // clear

      if (mode === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        title.innerHTML = 'Welcome back';
        subtitle.innerHTML = 'Sign in to access your dashboard.';
      } else {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        title.innerHTML = 'Create an account';
        subtitle.innerHTML = 'AI-powered grading that saves you 10+ hours a week.';
      }
    }

    // Handlers (Preserved Logic)
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = e.target.querySelector('button[type="submit"]');
      const originalHtml = btn.innerHTML;

      try {
        btn.innerHTML = 'Signing In...';
        btn.disabled = true;
        showMessage('');

        const res = await fetch(`${window.API_CONFIG.AUTH_BASE_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('smartassessUser', JSON.stringify(data.user));
        localStorage.setItem('jwt', data.token);
        window.location.href = `home.html`;
      } catch (err) {
        showMessage(err.message === 'Failed to fetch' ? 'Cannot reach server. It might be sleeping, try again in 30s.' : err.message);
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const btn = e.target.querySelector('button[type="submit"]');
      const originalHtml = btn.innerHTML;

      try {
        btn.innerHTML = 'Submitting...';
        btn.disabled = true;
        showMessage('');

        const res = await fetch(`${window.API_CONFIG.AUTH_BASE_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Signup failed');

        showMessage('Account created! Logging you in...', 'success');
        setTimeout(() => switchTab('login'), 1000);
      } catch (err) {
        showMessage(err.message === 'Failed to fetch' ? 'Cannot reach server. It might be sleeping, try again in 30s.' : err.message);
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
